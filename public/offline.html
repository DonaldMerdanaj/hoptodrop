<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <title>HopToDrop offline</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #111827;
        background: #f8fafc;
        font-family: Inter, Arial, sans-serif;
      }
      main {
        width: min(100%, 390px);
        border: 1px solid #e5e7eb;
        border-radius: 28px;
        padding: 24px;
        background: #fff;
        box-shadow: 0 24px 70px rgba(17,24,39,.14);
      }
      img { width: 58px; height: 58px; border-radius: 16px; }
      h1 { margin: 18px 0 8px; font-size: 28px; letter-spacing: 0; }
      p { margin: 0; color: #6b7280; line-height: 1.5; }
      a {
        display: inline-flex;
        justify-content: center;
        width: 100%;
        margin-top: 18px;
        border-radius: 16px;
        padding: 14px;
        color: #fff;
        background: #111827;
        font-weight: 900;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icon.svg" alt="HopToDrop" />
      <h1>You are offline</h1>
      <p>HopToDrop needs an internet connection for live taxis, maps, login, and booking updates.</p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
